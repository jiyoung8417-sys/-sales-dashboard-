<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 KPI 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* [디자인] 클로드가 작성한 CSS 전체 복구 */
:root {
  --bg: #f5f5f3; --card: #ffffff; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text1: #1a1a18; --text2: #5a5955; --text3: #9a9893; --blue: #378ADD;
  --teal: #1D9E75; --amber: #EF9F27; --red: #E24B4A; --purple: #7F77DD;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }

.gnb { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; padding: 0 24px; height: 52px; }
.gnb-logo { font-size: 14px; font-weight: 600; color: var(--text1); margin-right: 28px; padding-right: 20px; border-right: 1px solid var(--border); }
.gnb-tabs { display: flex; flex: 1; gap: 0; }
.gnb-tab { height: 52px; padding: 0 18px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
.gnb-tab:hover { color: var(--text1); }
.gnb-tab.active { color: var(--text1); border-bottom-color: var(--text1); font-weight: 500; }
.btn-refresh { height: 30px; padding: 0 12px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 5px; }

.loading-screen { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.page { display: none; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.kpi-val { font-size: 28px; font-weight: 600; color: var(--text1); line-height: 1; }
.kpi-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
.progress-bar { height: 5px; background: var(--bg); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width .6s; }
.kpi-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 9px; border-radius: 20px; margin-top: 8px; }
.badge-info { background: #E6F1FB; color: #185FA5; }
.error-banner { background: #FFF3F3; border: 1px solid #FFC0C0; padding: 12px 20px; font-size: 13px; color: #c00; display: none; }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-msg">데이터 불러오는 중...</div>
</div>

<div class="error-banner" id="error-banner"></div>

<nav class="gnb">
  <div class="gnb-logo">영업 KPI</div>
  <div class="gnb-tabs">
    <div class="gnb-tab active" onclick="switchPage('home',this)">홈</div>
    <div class="gnb-tab" onclick="switchPage('sales',this)">매출 현황</div>
    <div class="gnb-tab" onclick="switchPage('pipeline',this)">CRM 파이프라인</div>
    <div class="gnb-tab" onclick="switchPage('group',this)">그룹별 현황</div>
    <div class="gnb-tab" onclick="switchPage('report',this)">주간 보고</div>
  </div>
  <button class="btn-refresh" onclick="loadAllData()">↻ 새로고침</button>
</nav>

<div class="page active" id="page-home">
  <div class="grid-3">
    <div class="card">
      <div class="kpi-label">연간 누적 실적</div>
      <div class="kpi-val" id="h-total">-</div>
      <div class="progress-bar"><div class="progress-fill" id="h-progress" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="kpi-label">당월 실적 건수</div>
      <div class="kpi-val" id="h-monthly-count">-</div>
    </div>
    <div class="card">
      <div class="kpi-label">CRM 전체 건수</div>
      <div class="kpi-val" id="h-crm-total">-</div>
    </div>
  </div>
</div>

<!-- 나머지 페이지(sales, pipeline 등)는 기존 코드를 유지하거나 클로드에게 추가 수정을 요청하세요 -->

<script>
const CONFIG = {
  // 웹에 공개된 시트 ID
  SHEET_ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0',
  SHEETS: { SALES: '실적', TARGET: '목표', CRM: 'CRM' }
};

let D = { sales: [], targets: [], crm: [] };

function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

async function loadAllData() {
  document.getElementById('loading').style.display = 'flex';
  try {
    const [sText, tText, cText] = await Promise.all([
      fetch(sheetUrl(CONFIG.SHEETS.SALES)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.TARGET)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.CRM)).then(r => r.text())
    ]);

    D.sales = parseCSV(sText);
    D.targets = parseCSV(tText);
    D.crm = parseCSV(cText);

    renderHome();
  } catch (e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = "연동 실패: " + e.message;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += c;
  }
  result.push(cur);
  return result.map(s => s.replace(/^"|"$/g, '').replace(/""/g, '"'));
}

function renderHome() {
  const totalAmt = D.sales.reduce((sum, r) => sum + (parseFloat(r['금액']?.replace(/,/g,'')) || 0), 0);
  document.getElementById('h-total').textContent = totalAmt.toLocaleString() + "원";
  document.getElementById('h-monthly-count').textContent = D.sales.length + "건";
  document.getElementById('h-crm-total').textContent = D.crm.length + "건";
  document.getElementById('h-progress').style.width = '50%'; // 예시 데이터
}

function switchPage(id, el) {
  document.querySelectorAll('.gnb-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

loadAllData();
</script>
</body>
</html>
