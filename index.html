<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 KPI 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* 클로드 원본 CSS 스타일 복구 */
:root {
  --bg: #f5f5f3; --card: #ffffff; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text1: #1a1a18; --text2: #5a5955; --text3: #9a9893; --blue: #378ADD;
  --teal: #1D9E75; --amber: #EF9F27; --red: #E24B4A; --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }

/* GNB */
.gnb { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; padding: 0 24px; height: 52px; }
.gnb-logo { font-size: 14px; font-weight: 600; color: var(--text1); margin-right: 28px; padding-right: 20px; border-right: 1px solid var(--border); }
.gnb-tabs { display: flex; flex: 1; }
.gnb-tab { height: 52px; padding: 0 18px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all .15s; }
.gnb-tab.active { color: var(--text1); border-bottom-color: var(--text1); font-weight: 500; }
.gnb-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text3); }

/* Layout */
.page { display: none; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 16px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 16px; }

/* Card */
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 24px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; }

/* KPI */
.kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.kpi-val { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.kpi-sub { font-size: 12px; color: var(--text3); }
.badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 8px; }
.badge-up { background: #EAF3DE; color: #3B6D11; }
.badge-blue { background: #E6F1FB; color: #185FA5; }

/* Rank List */
.rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rank-item:last-child { border-bottom: none; }
.rank-name { display: flex; gap: 12px; }
.rank-no { color: var(--text3); width: 15px; }

/* Loading */
#loading { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:16px; font-size:14px; color:var(--text2);">데이터 분석 중...</p>
</div>

<nav class="gnb">
    <div class="gnb-logo">영업 대시보드</div>
    <div class="gnb-tabs">
        <div class="gnb-tab active" onclick="switchPage('home', this)">홈</div>
        <div class="gnb-tab" onclick="switchPage('sales', this)">매출 현황</div>
        <div class="gnb-tab" onclick="switchPage('pipeline', this)">CRM 파이프라인</div>
        <div class="gnb-tab" onclick="switchPage('group', this)">그룹별 현황</div>
        <div class="gnb-tab" onclick="switchPage('report', this)">주간 보고</div>
    </div>
    <div class="gnb-right">
        <span id="current-time"></span>
        <button onclick="loadAllData()" style="cursor:pointer; background:none; border:1px solid var(--border2); padding:4px 12px; border-radius:4px; font-size:12px;">새로고침</button>
    </div>
</nav>

<div class="page active" id="page-home">
    <div class="grid-3">
        <div class="card">
            <div class="kpi-label">연간 누적 실적</div>
            <div class="kpi-val" id="h-total">-</div>
            <div class="kpi-sub" id="h-target">목표 -</div>
            <div class="badge badge-blue" id="h-progress">진도율 -%</div>
        </div>
        <div class="card">
            <div class="kpi-label">연간 목표 달성률</div>
            <div class="kpi-val" id="h-rate">-%</div>
            <div class="kpi-sub">3개월 누적 기준</div>
            <div class="badge badge-up" id="h-compare">▲ 전월 대비 -%</div>
        </div>
        <div class="card">
            <div class="kpi-label">CRM 진행 건수</div>
            <div class="kpi-val" id="h-crm-count">-건</div>
            <div class="kpi-sub" id="h-crm-sub">진행 중 -건 · 종료 -건</div>
            <div class="badge badge-blue" id="h-crm-step">견적 단계 -건</div>
        </div>
    </div>

    <div class="grid-2-1">
        <div class="card">
            <div class="card-title">월별 실적 추이 (누적)</div>
            <div style="height: 300px;"><canvas id="chart-trend"></canvas></div>
        </div>
        <div class="card">
            <div class="card-title">신규 고객 Top 5</div>
            <div id="rank-new"></div>
            <div class="card-title" style="margin-top: 24px; margin-bottom: 12px;">해지 고객 Top 3</div>
            <div id="rank-cancel"></div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    SHEET_ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0',
    SHEETS: { SALES: '실적', TARGET: '목표', CRM: 'CRM' }
};

let D = { sales: [], targets: [], crm: [] };
let charts = {};

function sheetUrl(sheetName) {
    return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

async function loadAllData() {
    document.getElementById('loading').style.display = 'flex';
    try {
        const [sRes, tRes, cRes] = await Promise.all([
            fetch(sheetUrl(CONFIG.SHEETS.SALES)).then(r => r.text()),
            fetch(sheetUrl(CONFIG.SHEETS.TARGET)).then(r => r.text()),
            fetch(sheetUrl(CONFIG.SHEETS.CRM)).then(r => r.text())
        ]);
        D.sales = parseCSV(sRes);
        D.targets = parseCSV(tRes);
        D.crm = parseCSV(cRes);
        renderHome();
    } catch (e) { alert("데이터 로드 실패: " + e.message); }
    finally { document.getElementById('loading').style.display = 'none'; }
}

function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
        const vals = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/"/g, '').trim(); });
        return obj;
    });
}

function fmt(v) { 
    if (v >= 100000000) return (v / 100000000).toFixed(1) + '억';
    if (v >= 10000) return (v / 10000).toLocaleString() + '만';
    return v.toLocaleString();
}

function renderHome() {
    // 1. KPI 계산
    const totalSales = D.sales.reduce((s, r) => s + (parseFloat(r['금액']?.replace(/,/g,'')) || 0), 0);
    const totalTarget = D.targets.reduce((s, r) => s + (parseFloat(r['목표금액']?.replace(/,/g,'')) || 0), 0);
    
    document.getElementById('h-total').textContent = fmt(totalSales);
    document.getElementById('h-target').textContent = `목표 ${fmt(totalTarget)}`;
    document.getElementById('h-progress').textContent = `진도율 ${(totalSales/totalTarget*100).toFixed(1)}%`;
    document.getElementById('h-rate').textContent = (totalSales/totalTarget*100).toFixed(1) + '%';
    
    const activeCrm = D.crm.filter(r => r['진행상태'] === '진행중');
    document.getElementById('h-crm-count').textContent = D.crm.length + '건';
    document.getElementById('h-crm-sub').textContent = `진행 중 ${activeCrm.length}건 · 종료 ${D.crm.length - activeCrm.length}건`;
    document.getElementById('h-crm-step').textContent = `견적 단계 ${D.crm.filter(r => r['단계']==='견적').length}건`;

    // 2. 랭킹 리스트 (Top 5)
    const sortedSales = [...D.sales].sort((a,b) => (parseFloat(b['금액']?.replace(/,/g,'')) || 0) - (parseFloat(a['금액']?.replace(/,/g,'')) || 0));
    document.getElementById('rank-new').innerHTML = sortedSales.slice(0, 5).map((r, i) => `
        <div class="rank-item">
            <div class="rank-name"><span class="rank-no">${i+1}</span> ${r['고객사']}</div>
            <div style="font-weight:600;">${fmt(parseFloat(r['금액']?.replace(/,/g,'')) || 0)}</div>
        </div>`).join('');

    // 3. 차트 (월별 추이)
    drawTrendChart();
}

function drawTrendChart() {
    const ctx = document.getElementById('chart-trend').getContext('2d');
    if(charts.trend) charts.trend.destroy();
    
    // 월별 데이터 집계 로직 (간략화)
    const labels = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
    const data = labels.map((_, i) => D.sales.filter(r => parseInt(r['매출월']) <= i+1).reduce((s,r) => s + (parseFloat(r['금액']?.replace(/,/g,'')) || 0), 0));

    charts.trend = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '실적', data: data, borderColor: '#1D9E75', backgroundColor: '#1D9E7522', fill: true, tension: 0.4
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function switchPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.gnb-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    el.classList.add('active');
}

// 시간 업데이트
setInterval(() => { document.getElementById('current-time').textContent = new Date().toLocaleTimeString(); }, 1000);

loadAllData();
</script>
</body>
</html>
