<!-- 클로드 원본 디자인(CSS/HTML)을 그대로 사용합니다 -->
<!-- (전체 코드를 복사해서 index.html에 덮어쓰기 하세요) -->

<script>
// ============================================================
// CONFIG — 이 부분만 연동을 위해 수정되었습니다.
// ============================================================
const CONFIG = {
  // 웹에 게시된 시트 ID
  SHEET_ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0',
  SHEETS: {
    SALES: '실적',
    TARGET: '목표',
    CRM: 'CRM'
  }
};

// Vercel 환경 변수가 있다면 우선 사용
if (typeof process !== 'undefined' && process.env.NEXT_PUBLIC_SPREADSHEET_ID) {
    CONFIG.SHEET_ID = process.env.NEXT_PUBLIC_SPREADSHEET_ID;
}

// 구글 시트 게시 URL 생성 (인증 없이 접근)
function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

// 전역 데이터 객체
let D = { sales: [], targets: [], crm: [] };

// 데이터 로드 로직 수정
async function loadAllData() {
  showLoading(true);
  try {
    setLoadingMsg('데이터 불러오는 중...');
    
    // 비동기로 모든 시트 데이터를 동시에 가져옴
    const [salesRes, targetRes, crmRes] = await Promise.all([
      fetch(sheetUrl(CONFIG.SHEETS.SALES)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.TARGET)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.CRM)).then(r => r.text())
    ]);

    D.sales = parseCSV(salesRes);
    D.targets = parseCSV(targetRes);
    D.crm = parseCSV(crmRes);

    document.getElementById('last-update').textContent = '업데이트: ' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});

    populatePersonSelect();
    populateProductSelect();
    renderAll(); // 클로드의 원래 렌더링 함수를 실행
    hideError();
  } catch(e) {
    showError('데이터 연동 실패: ' + e.message);
    console.error(e);
  }
  showLoading(false);
}

// [이후의 parseCSV, renderAll, renderHome 등 모든 클로드 원본 함수는 그대로 두시면 됩니다]
</script>
