<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 KPI 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* 클로드 원본 CSS 스타일 (절대 수정 금지) */
:root {
  --bg: #f5f5f3; --card: #ffffff; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text1: #1a1a18; --text2: #5a5955; --text3: #9a9893; --blue: #378ADD;
  --teal: #1D9E75; --amber: #EF9F27; --red: #E24B4A; --purple: #7F77DD;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }
.gnb { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 0.5px solid var(--border2); display: flex; align-items: center; padding: 0 24px; height: 52px; }
.gnb-logo { font-size: 14px; font-weight: 600; color: var(--text1); margin-right: 28px; padding-right: 20px; border-right: 1px solid var(--border); }
.gnb-tabs { display: flex; flex: 1; }
.gnb-tab { height: 52px; padding: 0 18px; font-size: 13px; color: var(--text2); cursor: pointer; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all .15s; }
.gnb-tab.active { color: var(--text1); border-bottom-color: var(--text1); font-weight: 500; }
.page { display: none; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.kpi-val { font-size: 28px; font-weight: 600; color: var(--text1); line-height: 1; }
.progress-bar { height: 5px; background: var(--bg); border-radius: 3px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--blue); transition: width .6s; }
/* (이하 클로드 원본 스타일 유지...) */
</style>
</head>
<body>

<div id="loading" style="position:fixed; inset:0; background:#fff; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
  <div style="width:36px; height:36px; border:3px solid #eee; border-top-color:#378ADD; border-radius:50%; animation:spin .8s linear infinite;"></div>
  <p style="margin-top:10px; font-size:14px; color:#5a5955;">데이터 분석 중...</p>
</div>

<nav class="gnb">
  <div class="gnb-logo">영업 KPI</div>
  <div class="gnb-tabs">
    <div class="gnb-tab active" onclick="switchPage('home',this)">홈</div>
    <div class="gnb-tab" onclick="switchPage('sales',this)">매출 현황</div>
    <div class="gnb-tab" onclick="switchPage('pipeline',this)">CRM 파이프라인</div>
    <div class="gnb-tab" onclick="switchPage('group',this)">그룹별 현황</div>
    <div class="gnb-tab" onclick="switchPage('report',this)">주간 보고</div>
  </div>
  <button onclick="loadAllData()" style="padding:4px 10px; font-size:12px; cursor:pointer;">↻ 새로고침</button>
</nav>

<div class="page active" id="page-home">
  <div class="grid-3">
    <div class="card">
      <div class="kpi-label">연간 누적 실적</div>
      <div class="kpi-val" id="h-total">-</div>
      <div class="progress-bar"><div class="progress-fill" id="h-progress" style="width:0%"></div></div>
    </div>
    <div class="card">
      <div class="kpi-label">연간 목표 달성률</div>
      <div class="kpi-val" id="h-rate">-%</div>
    </div>
    <div class="card">
      <div class="kpi-label">CRM 진행 건수</div>
      <div class="kpi-val" id="h-crm-count">-건</div>
    </div>
  </div>
  <!-- 클로드 원본의 차트와 리스트가 들어갈 자리 -->
  <div style="display:grid; grid-template-columns: 2fr 1fr; gap:12px; margin-top:16px;">
    <div class="card">
      <div style="font-weight:600; margin-bottom:15px;">월별 실적 추이</div>
      <div style="height:300px;"><canvas id="chart-trend"></canvas></div>
    </div>
    <div class="card">
      <div style="font-weight:600; margin-bottom:15px;">실적 랭킹</div>
      <div id="rank-list" style="font-size:13px;"></div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SHEET_ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0',
  SHEETS: { SALES: '실적', TARGET: '목표', CRM: 'CRM' }
};

function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

let D = { sales: [], targets: [], crm: [] };
let charts = {};

async function loadAllData() {
  document.getElementById('loading').style.display = 'flex';
  try {
    const [s, t, c] = await Promise.all([
      fetch(sheetUrl(CONFIG.SHEETS.SALES)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.TARGET)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.CRM)).then(r => r.text())
    ]);
    D.sales = parseCSV(s); D.targets = parseCSV(t); D.crm = parseCSV(c);
    renderHome();
  } catch (e) { alert("연동 오류: " + e.message); }
  finally { document.getElementById('loading').style.display = 'none'; }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(h => h.replace(/"/g, '').trim());
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/"/g, '').trim(); });
    return obj;
  });
}

function renderHome() {
  const n = (v) => parseFloat((v+'').replace(/,/g,'')) || 0;
  const totalSales = D.sales.reduce((s,r) => s + n(r['금액']), 0);
  const totalTarget = D.targets.reduce((s,r) => s + n(r['목표금액']), 0);
  
  document.getElementById('h-total').textContent = totalSales.toLocaleString() + '원';
  const rate = totalTarget > 0 ? (totalSales/totalTarget*100).toFixed(1) : 0;
  document.getElementById('h-rate').textContent = rate + '%';
  document.getElementById('h-progress').style.width = Math.min(rate, 100) + '%';
  document.getElementById('h-crm-count').textContent = D.crm.length + '건';

  // 랭킹 리스트
  const top5 = [...D.sales].sort((a,b) => n(b['금액']) - n(a['금액'])).slice(0,5);
  document.getElementById('rank-list').innerHTML = top5.map((r,i) => `
    <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:0.5px solid #eee;">
      <span>${i+1}. ${r['고객사']}</span>
      <strong>${Math.round(n(r['금액'])/10000).toLocaleString()}만</strong>
    </div>`).join('');

  drawChart();
}

function drawChart() {
    const ctx = document.getElementById('chart-trend').getContext('2d');
    if(charts.trend) charts.trend.destroy();
    charts.trend = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'],
            datasets: [{ label: '실적 추이', data: [/* 월별 집계 데이터... */], borderColor: '#378ADD', tension: 0.3, fill: true, backgroundColor: '#378ADD11' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function switchPage(id, el) {
    document.querySelectorAll('.gnb-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

@keyframes spin { to { transform: rotate(360deg); } }
loadAllData();
</script>
</body>
</html>
