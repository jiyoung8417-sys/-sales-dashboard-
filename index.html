<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamline Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #f8f9fa; --card: #ffffff; --border: rgba(0,0,0,0.06); 
  --text1: #111827; --text2: #4b5563; --text3: #9ca3af;
  --blue: #2563eb; --teal: #059669; --amber: #f59e0b; --red: #dc2626;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text1); }

.gnb { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; height: 60px; justify-content: space-between; }
.logo { font-size: 20px; font-weight: 900; color: var(--text1); letter-spacing: -1px; }
.tabs { display: flex; gap: 8px; margin-left: 40px; }
.tab { padding: 8px 16px; font-size: 14px; color: var(--text2); cursor: pointer; border-radius: 8px; font-weight: 500; }
.tab.active { background: #f3f4f6; color: var(--text1); }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.page { display: none; }
.page.active { display: block; }

.grid-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
.kpi-card { background: var(--card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); border-left: 4px solid var(--blue); }
.kpi-label { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 10px; display: block; }
.kpi-value { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.kpi-meta { font-size: 12px; color: var(--text3); }

.main-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
.card { background: var(--card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); }
.chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; display: flex; justify-content: space-between; }

.rank-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
.crm-bar-container { margin-bottom: 15px; }
.crm-bar-bg { height: 8px; background: #f3f4f6; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.crm-bar-fill { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.6s; }

#loader { position: fixed; inset: 0; background: #fff; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f4f6; border-top-color: var(--blue); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:20px;">Dreamline 데이터 동기화 중...</p></div>

<nav class="gnb">
  <div style="display:flex; align-items:center;">
    <div class="logo">DREAMLINE</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('home', this)">홈 대시보드</div>
      <div class="tab" onclick="switchTab('sales', this)">매출 상세</div>
      <div class="tab" onclick="switchTab('crm', this)">파이프라인</div>
    </div>
  </div>
  <button style="cursor:pointer; background:none; border:1px solid #ddd; padding:5px 10px; border-radius:4px;" onclick="init()">↻ 갱신</button>
</nav>

<div class="container">
  <div id="page-home" class="page active">
    <div class="grid-top">
      <div class="kpi-card"><span class="kpi-label">연간 누적 실적</span><div class="kpi-value" id="kpi-total">-</div><div class="kpi-meta" id="kpi-target-info">목표 대비 -</div></div>
      <div class="kpi-card" style="border-left-color: var(--amber)"><span class="kpi-label">예상수주 합계</span><div class="kpi-value" id="kpi-forecast">-</div><div class="kpi-meta">기회 데이터 기준</div></div>
      <div class="kpi-card" style="border-left-color: var(--teal)"><span class="kpi-label" id="label-month">당월 목표 달성률</span><div class="kpi-value" id="kpi-month-rate">-%</div><div class="kpi-meta" id="kpi-month-val">-</div></div>
      <div class="kpi-card" style="border-left-color: #8b5cf6"><span class="kpi-label">CRM 성공률</span><div class="kpi-value" id="kpi-crm-rate">-%</div><div class="kpi-meta" id="kpi-crm-info">-</div></div>
    </div>

    <div class="main-grid">
      <div class="card">
        <div class="chart-title">월별 실적 추이 <span style="font-size:12px; font-weight:normal;"><span style="color:#e5e7eb">■</span> 목표 <span style="color:#2563eb">■</span> 실적 <span style="color:#f59e0b">■</span> 예상</span></div>
        <div style="height: 350px;"><canvas id="chart-main"></canvas></div>
      </div>
      <div class="card">
        <div class="chart-title">수주 TOP 5</div>
        <div id="list-top"></div>
        <div class="chart-title" style="margin-top:25px; color:var(--red)">해지 TOP 3</div>
        <div id="list-cancel"></div>
      </div>
    </div>

    <div class="main-grid" style="grid-template-columns: 1fr 1fr;">
      <div class="card"><div class="chart-title">매출구분별 현황</div><div style="height:250px;"><canvas id="chart-div"></canvas></div></div>
      <div class="card"><div class="chart-title">파이프라인 단계</div><div id="list-pipeline"></div></div>
    </div>
  </div>

  <div id="page-sales" class="page"><div class="card"><h3>매출 상세 내역</h3><div id="sales-table-container" style="margin-top:20px;">데이터를 분석 중입니다...</div></div></div>
  <div id="page-crm" class="page"><div class="card"><h3>CRM 파이프라인 상세</h3><div id="crm-table-container" style="margin-top:20px;">데이터를 분석 중입니다...</div></div></div>
</div>

<script>
const SPREADSHEET_ID = '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0';
const SHEETS = { SALES: '실적', TARGET: '목표', CRM: 'CRM' };

function getUrl(n) { return `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`; }

let DATA = { sales: [], target: [], crm: [] };
let charts = {};

async function init() {
  document.getElementById('loader').style.display = 'flex';
  try {
    const [s, t, c] = await Promise.all([
      fetch(getUrl(SHEETS.SALES)).then(r => r.text()),
      fetch(getUrl(SHEETS.TARGET)).then(r => r.text()),
      fetch(getUrl(SHEETS.CRM)).then(r => r.text())
    ]);
    DATA.sales = parse(s); DATA.target = parse(t); DATA.crm = parse(c);
    render();
  } catch (e) { alert('데이터 연동 에러'); }
  finally { document.getElementById('loader').style.display = 'none'; }
}

function parse(txt) {
  const lines = txt.trim().split('\n');
  const h = lines[0].split(',').map(v => v.replace(/"/g,'').trim());
  return lines.slice(1).map(l => {
    const v = l.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
    const o = {}; h.forEach((name, i) => { o[name] = (v[i] || '').replace(/"/g,'').trim(); });
    return o;
  });
}

function n(v) { return parseFloat((v||'0').replace(/,/g,'')) || 0; }
function f(v) { return v >= 100000000 ? (v/100000000).toFixed(1)+'억' : (v/10000).toLocaleString()+'만'; }

function render() {
  // 1. 당월 정의 (실적이 있는 마지막 달)
  const months = DATA.sales.map(r => parseInt(r['매출월'])).filter(m => !isNaN(m));
  const lastMonth = Math.max(...months);
  document.getElementById('label-month').textContent = `${lastMonth}월 목표 달성률`;

  // 2. KPI 계산
  const totalActual = DATA.sales.reduce((s, r) => s + n(r['금액']), 0);
  const totalTarget = DATA.target.reduce((s, r) => s + n(r['목표금액']), 0);
  const totalForecast = DATA.sales.reduce((s, r) => s + n(r['예상수주']), 0);
  
  document.getElementById('kpi-total').textContent = f(totalActual);
  document.getElementById('kpi-target-info').textContent = `연간 목표 ${f(totalTarget)} 대비 ${(totalActual/totalTarget*100).toFixed(1)}%`;
  document.getElementById('kpi-forecast').textContent = f(totalForecast);

  const curActual = DATA.sales.filter(r => parseInt(r['매출월']) === lastMonth).reduce((s,r) => s + n(r['금액']), 0);
  const curTarget = DATA.target.filter(r => parseInt(r['매출월']) === lastMonth).reduce((s,r) => s + n(r['목표금액']), 0);
  document.getElementById('kpi-month-rate').textContent = (curActual/curTarget*100).toFixed(1) + '%';
  document.getElementById('kpi-month-val').textContent = `실적 ${f(curActual)} / 목표 ${f(curTarget)}`;

  const crmDone = DATA.crm.filter(r => r['상태'] === '종료(성공)').length;
  document.getElementById('kpi-crm-rate').textContent = (crmDone/DATA.crm.length*100).toFixed(1) + '%';
  document.getElementById('kpi-crm-info').textContent = `전체 ${DATA.crm.length}건 중 ${crmDone}건 성공`;

  // 3. 차트 & 리스트
  renderTrend(lastMonth, totalTarget);
  document.getElementById('list-top').innerHTML = [...DATA.sales].sort((a,b)=>n(b['금액'])-n(a['금액'])).slice(0,5).map((r,i)=>`<div class="rank-item"><span>${i+1}. ${r['고객사']}</span><strong>${f(n(r['금액']))}</strong></div>`).join('');
  document.getElementById('list-cancel').innerHTML = DATA.sales.filter(r=>r['해지']==='해지').slice(0,3).map(r=>`<div class="rank-item"><span style="color:var(--red)">${r['고객사']}</span><strong style="color:var(--red)">-${f(n(r['금액']))}</strong></div>`).join('');

  // 4. 파이프라인
  const steps = ['기회인지','제안','견적','계약','개통완료'];
  document.getElementById('list-pipeline').innerHTML = steps.map(s => {
    const cnt = DATA.crm.filter(r=>r['단계']===s).length;
    return `<div class="crm-bar-container"><div style="display:flex; justify-content:space-between; font-size:12px;"><span>${s}</span><span>${cnt}건</span></div><div class="crm-bar-bg"><div class="crm-bar-fill" style="width:${cnt/DATA.crm.length*100}%"></div></div></div>`;
  }).join('');

  // 5. 상세 탭 테이블
  renderTable('sales-table-container', DATA.sales);
  renderTable('crm-table-container', DATA.crm);
}

function renderTrend(lastM, totalT) {
  const ctx = document.getElementById('chart-main').getContext('2d');
  if(charts.main) charts.main.destroy();
  
  const avgActual = (DATA.sales.reduce((s,r)=>s+n(r['금액']), 0)) / lastM;
  let cumT=0, cumA=0, cumF=0;
  const tData=[], aData=[], fData=[];

  for(let m=1; m<=12; m++) {
    cumT += DATA.target.filter(r=>parseInt(r['매출월'])===m).reduce((s,r)=>s+n(r['목표금액']), 0);
    cumA += DATA.sales.filter(r=>parseInt(r['매출월'])===m).reduce((s,r)=>s+n(r['금액']), 0);
    // 노란 점선 로직: (실적평균 * 현재달) + (해당 달의 예상수주)
    const mForecast = DATA.sales.filter(r=>parseInt(r['매출월'])===m).reduce((s,r)=>s+n(r['예상수주']), 0);
    cumF = (avgActual * m) + mForecast;

    tData.push(cumT);
    aData.push(m <= lastM ? cumA : null);
    fData.push(cumF);
  }

  charts.main = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length:12}, (_,i)=>(i+1)+'월'),
      datasets: [
        { label: '목표', data: tData, borderColor: '#e5e7eb', borderDash: [5,5], fill: false },
        { label: '실적', data: aData, borderColor: '#2563eb', borderWidth: 3, fill: false },
        { label: '예상', data: fData, borderColor: '#f59e0b', borderDash: [2,2], fill: false }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>f(v)}}}}
  });
}

function renderTable(id, data) {
  if(!data.length) return;
  const h = Object.keys(data[0]);
  let html = `<table style="width:100%; border-collapse:collapse; font-size:12px;"><tr style="background:#f9fafb; border-bottom:1px solid #eee;">`;
  h.forEach(name => html += `<th style="padding:10px; text-align:left;">${name}</th>`);
  html += `</tr>`;
  data.slice(0, 15).forEach(r => {
    html += `<tr style="border-bottom:1px solid #f3f4f6;">`;
    h.forEach(name => html += `<td style="padding:10px;">${r[name]}</td>`);
    html += `</tr>`;
  });
  html += `</table>`;
  document.getElementById(id).innerHTML = html;
}

function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); document.getElementById('page-'+id).classList.add('active');
}

init();
</script>
</body>
</html>
