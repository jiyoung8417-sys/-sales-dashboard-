<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamline Intelligence Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* 하이엔드 비즈니스 인텔리전스 UI */
:root {
  --bg: #f0f2f5; --card: #ffffff; --border: rgba(0,0,0,0.05); 
  --text-main: #1a1a1b; --text-sub: #64748b;
  --primary: #0f172a; --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; }

/* GNB & Filter Bar */
.gnb { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; color: var(--primary); }
.filter-group { display: flex; gap: 10px; background: #eee; padding: 4px; border-radius: 12px; }
.filter-btn { padding: 8px 20px; border: none; background: transparent; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-sub); transition: 0.2s; }
.filter-btn.active { background: #fff; color: var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

/* Layout */
.container { max-width: 1600px; margin: 0 auto; padding: 30px; }
.page { display: none; }
.page.active { display: block; animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1); }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Executive KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 30px; }
.kpi-card { background: var(--card); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.02); transition: 0.3s; }
.kpi-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); }
.kpi-label { font-size: 14px; font-weight: 700; color: var(--text-sub); margin-bottom: 15px; display: block; }
.kpi-value { font-size: 32px; font-weight: 800; margin-bottom: 10px; color: var(--primary); letter-spacing: -1px; }
.kpi-trend { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

/* Dashboard Widgets */
.main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
.card { background: var(--card); padding: 30px; border-radius: var(--radius); border: 1px solid var(--border); }
.card-title { font-size: 18px; font-weight: 800; margin-bottom: 25px; color: var(--primary); display: flex; justify-content: space-between; }

/* CRM Funnel & Lists */
.funnel-item { margin-bottom: 20px; }
.funnel-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 700; }
.funnel-bar-bg { height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden; }
.funnel-bar-fill { height: 100%; background: var(--accent); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

/* Loader */
#loader { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.spinner { width: 50px; height: 50px; border: 5px solid #f3f4f6; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s infinite linear; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:24px; font-weight:800; letter-spacing:-0.5px;">DREAMLINE INTELLIGENCE CONNECTING...</p></div>

<nav class="gnb">
  <div class="logo">DREAMLINE</div>
  <div class="filter-group" id="group-filters">
    <button class="filter-btn active" onclick="setGroup('전체', this)">전체</button>
    <button class="filter-btn" onclick="setGroup('1그룹', this)">1그룹</button>
    <button class="filter-btn" onclick="setGroup('2그룹', this)">2그룹</button>
    <button class="filter-btn" onclick="setGroup('3그룹', this)">3그룹</button>
  </div>
  <div style="font-size:12px; font-weight:700; color:var(--text-sub);" id="last-update">READY</div>
</nav>

<div class="container">
  <div id="page-home" class="page active">
    <!-- 엑셀 '대시보드' 시트의 KPI 지표 반영 -->
    <div class="kpi-row">
      <div class="kpi-card">
        <span class="kpi-label">현재 누적 집계</span>
        <div class="kpi-value" id="val-total">0</div>
        <div class="kpi-trend" style="color:var(--accent)" id="val-progress">진도율 0%</div>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">연말 예상 매출</span>
        <div class="kpi-value" id="val-forecast" style="color:var(--warning)">0</div>
        <div class="kpi-trend" id="val-forecast-diff">추세 대비 분석중</div>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">목표 달성률</span>
        <div class="kpi-value" id="val-rate" style="color:var(--success)">0%</div>
        <div class="kpi-trend" id="val-month-info">-</div>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">CRM 영업 성공률</span>
        <div class="kpi-value" id="val-crm-win">0%</div>
        <div class="kpi-trend" id="val-crm-total">-</div>
      </div>
    </div>

    <div class="main-layout">
      <div class="card">
        <div class="card-title">실적 추이 및 Dreamline 예측 <span style="font-size:12px; font-weight:500;">● 목표 ● 실적 ● 예측</span></div>
        <div style="height:400px;"><canvas id="chartMain"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">CRM 파이프라인 써머리</div>
        <div id="funnel-container"></div>
        <div class="card-title" style="margin-top:40px; border-top:1px solid #eee; padding-top:20px;">고액 매출 TOP 5</div>
        <div id="rank-container" style="font-size:14px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0',
  SHEETS: { SALES: '실적', TARGET: '목표', CRM: 'CRM' }
};

let RawData = { sales: [], target: [], crm: [] };
let CurrentGroup = '전체';
let ChartMain = null;

async function init() {
  document.getElementById('loader').style.display = 'flex';
  try {
    const fetchCSV = async (n) => {
      const r = await fetch(`https://docs.google.com/spreadsheets/d/${CONFIG.ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(n)}`);
      return await r.text();
    };
    const [s, t, c] = await Promise.all([fetchCSV(CONFIG.SHEETS.SALES), fetchCSV(CONFIG.SHEETS.TARGET), fetchCSV(CONFIG.SHEETS.CRM)]);
    RawData.sales = parseCSV(s); RawData.target = parseCSV(t); RawData.crm = parseCSV(c);
    render();
  } catch (e) { alert('데이터 연동 오류'); }
  finally { document.getElementById('loader').style.display = 'none'; }
}

function parseCSV(txt) {
  const lines = txt.trim().split('\n');
  const h = lines[0].split(',').map(v => v.replace(/"/g,'').trim());
  return lines.slice(1).map(l => {
    const v = l.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
    const o = {}; h.forEach((name, i) => { o[name] = (v[i] || '').replace(/"/g,'').trim(); });
    return o;
  });
}

const n = (v) => parseFloat((v||'0').replace(/[^0-9.-]+/g, "")) || 0;
const f = (v) => v >= 100000000 ? (v/100000000).toFixed(1)+'억' : (v/10000).toLocaleString()+'만';

function setGroup(g, el) {
  CurrentGroup = g;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  // 필터링 적용
  const sales = CurrentGroup === '전체' ? RawData.sales : RawData.sales.filter(r => r['그룹'] === CurrentGroup);
  const crm = CurrentGroup === '전체' ? RawData.crm : RawData.crm.filter(r => r['그룹'] === CurrentGroup);
  const target = CurrentGroup === '전체' ? RawData.target : RawData.target.filter(r => r['그룹'] === CurrentGroup);

  // 1. 핵심 KPI (엑셀 수식 반영)
  const totalA = sales.reduce((s, r) => s + n(r['금액']), 0);
  const totalT = target.reduce((s, r) => s + n(r['목표금액']), 0);
  const months = sales.map(r => parseInt(r['매출월'])).filter(m => !isNaN(m));
  const lastM = months.length > 0 ? Math.max(...months) : 3;

  document.getElementById('val-total').textContent = f(totalA);
  document.getElementById('val-progress').textContent = `진도율 ${(totalA/totalT*100).toFixed(1)}%`;
  
  const avgA = totalA / lastM;
  const totalF = sales.reduce((s, r) => s + n(r['예상수주']), 0);
  const yearForecast = (avgA * 12) + totalF;
  document.getElementById('val-forecast').textContent = f(yearForecast);

  const curA = sales.filter(r => n(r['매출월']) === lastM).reduce((s,r) => s + n(r['금액']), 0);
  const curT = target.filter(r => n(r['매출월']) === lastM).reduce((s,r) => s + n(r['목표금액']), 0);
  document.getElementById('val-rate').textContent = (curA/curT*100).toFixed(1) + '%';
  document.getElementById('val-month-info').textContent = `${lastM}월 목표 ${f(curT)} 대비`;

  const crmWin = crm.filter(r => String(r['상태']).includes('성공')).length;
  document.getElementById('val-crm-win').textContent = crm.length > 0 ? (crmWin/crm.length*100).toFixed(1)+'%' : '0%';
  document.getElementById('val-crm-total').textContent = `총 ${crm.length}건 중 ${crmWin}건 성공`;

  // 2. 메인 차트
  updateChart(sales, target, lastM, avgA);

  // 3. 파이프라인 써머리 (Funnel)
  const steps = ['기회인지','제안','견적','계약','개통완료'];
  document.getElementById('funnel-container').innerHTML = steps.map(s => {
    const cnt = crm.filter(r => String(r['단계']).includes(s)).length;
    const rate = crm.length > 0 ? (cnt/crm.length*100) : 0;
    return `<div class="funnel-item"><div class="funnel-label"><span>${s}</span><span>${cnt}건</span></div><div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:${rate}%"></div></div></div>`;
  }).join('');

  // 4. 랭킹
  document.getElementById('rank-container').innerHTML = [...sales].sort((a,b)=>n(b['금액'])-n(a['금액'])).slice(0,5).map((r,i)=>`
    <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f8fafc;">
      <span style="font-weight:700; color:var(--text-sub); margin-right:10px;">${i+1}</span>
      <span style="flex:1; font-weight:600;">${r['고객사']}</span>
      <span style="font-weight:800; color:var(--accent);">${f(n(r['금액']))}</span>
    </div>`).join('');
  
  document.getElementById('last-update').textContent = 'LAST UPDATED: ' + new Date().toLocaleTimeString();
}

function updateChart(sales, target, lastM, avgA) {
  const ctx = document.getElementById('chartMain').getContext('2d');
  if(ChartMain) ChartMain.destroy();

  let cumT=0, cumA=0;
  const tD=[], aD=[], fD=[];
  for(let m=1; m<=12; m++) {
    cumT += target.filter(r => n(r['매출월']) === m).reduce((s,r) => s + n(r['목표금액']), 0);
    const mA = sales.filter(r => n(r['매출월']) === m).reduce((s,r) => s + n(r['금액']), 0);
    const mF = sales.filter(r => n(r['매출월']) === m).reduce((s,r) => s + n(r['예상수주']), 0);
    cumA += mA;
    tD.push(cumT);
    aD.push(m <= lastM ? cumA : null);
    fD.push((avgA * m) + mF);
  }

  ChartMain = new Chart(ctx, {
    type: 'line',
    data: {
      labels: Array.from({length:12},(_,i)=>(i+1)+'월'),
      datasets: [
        { label: '목표', data: tD, borderColor: '#cbd5e1', borderDash: [5,5], fill: false, tension: 0.2 },
        { label: '실적', data: aD, borderColor: '#3b82f6', borderWidth: 4, pointBackgroundColor: '#3b82f6', fill: false, tension: 0.2 },
        { label: '예측', data: fD, borderColor: '#f59e0b', borderDash: [2,2], pointRadius: 0, fill: false, tension: 0.2 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{y:{ticks:{callback:v=>f(v)}}}}
  });
}

init();
</script>
</body>
</html>
