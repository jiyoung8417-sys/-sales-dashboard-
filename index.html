<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 KPI 대시보드 (No-Auth 버전)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- [기존 CSS 스타일 부분은 동일하므로 생략하거나 그대로 유지하시면 됩니다] -->
<style>
/* ... (사용자님이 주신 스타일 그대로 유지) ... */
:root {
  --bg: #f5f5f3; --card: #ffffff; --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
  --text1: #1a1a18; --text2: #5a5955; --text3: #9a9893; --blue: #378ADD;
  --teal: #1D9E75; --amber: #EF9F27; --red: #E24B4A; --purple: #7F77DD;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }
/* (이하 스타일 생략 - 기존 코드의 <style> 부분을 그대로 붙여넣으세요) */
</style>
</head>
<body>

<!-- [기존 HTML 구조 부분 - 그대로 유지] -->
<div class="loading-screen" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-msg">데이터 로딩 중...</div>
</div>
<div class="error-banner" id="error-banner"></div>
<nav class="gnb">
  <div class="gnb-logo">영업 KPI</div>
  <div class="gnb-tabs">
    <div class="gnb-tab active" onclick="switchPage('home',this)">홈</div>
    <div class="gnb-tab" onclick="switchPage('sales',this)">매출 현황</div>
    <div class="gnb-tab" onclick="switchPage('pipeline',this)">CRM 파이프라인</div>
    <div class="gnb-tab" onclick="switchPage('group',this)">그룹별 현황</div>
    <div class="gnb-tab" onclick="switchPage('report',this)">주간 보고</div>
  </div>
  <div class="gnb-right">
    <span class="gnb-clock" id="clock"></span>
    <span class="gnb-update" id="last-update"></span>
    <button class="btn-refresh" onclick="loadAllData()">↻ 새로고침</button>
  </div>
</nav>

<!-- [나머지 페이지 구조도 기존과 동일하게 유지] -->
<!-- ... 생략 ... -->

<script>
// ============================================================
// CONFIG — 인증 없이 시트 ID로만 작동하도록 수정
// ============================================================
const CONFIG = {
  // Vercel 환경 변수가 없으면 기본값으로 시트 ID 사용
  SHEET_ID: '1xkbKdUKzSawrVuYDu3zbt0lAuLVXeNmhs4u8hwmRbN0', 
  SHEETS: {
    SALES: '실적',
    TARGET: '목표',
    CRM: 'CRM'
  }
};

// Vercel 환경 변수(process.env)가 있는 환경인지 확인
if (typeof process !== 'undefined' && process.env.NEXT_PUBLIC_SPREADSHEET_ID) {
    CONFIG.SHEET_ID = process.env.NEXT_PUBLIC_SPREADSHEET_ID;
}

// ★ 핵심 수정: 구글 Gviz API를 이용해 인증 없이 CSV 데이터를 가져오는 URL
function sheetUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

// [이하 데이터 로드 및 렌더링 로직은 기존과 동일하지만, 오류 방지를 위해 인증 부분을 제거함]
let D = { sales: [], targets: [], crm: [] };

async function loadAllData() {
  showLoading(true);
  hideError();
  try {
    setLoadingMsg('데이터 불러오는 중...');
    
    // 비동기로 모든 시트 데이터를 가져옴
    const [salesRes, targetRes, crmRes] = await Promise.all([
      fetch(sheetUrl(CONFIG.SHEETS.SALES)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.TARGET)).then(r => r.text()),
      fetch(sheetUrl(CONFIG.SHEETS.CRM)).then(r => r.text())
    ]);

    D.sales = parseCSV(salesRes);
    D.targets = parseCSV(targetRes);
    D.crm = parseCSV(crmRes);

    document.getElementById('last-update').textContent = '업데이트: ' + new Date().toLocaleTimeString();
    
    // 데이터가 정상적으로 파싱되었는지 확인
    if(D.sales.length === 0) throw new Error("시트에서 데이터를 찾을 수 없습니다. '웹에 공개' 설정을 확인하세요.");

    populatePersonSelect();
    populateProductSelect();
    renderAll();
  } catch(e) {
    showError('연동 실패: ' + e.message);
    console.error(e);
  } finally {
    showLoading(false);
  }
}

// [기존 유틸 함수들 - parseCSV, fmt, n 등 그대로 유지]
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 1) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h.trim()] = (vals[i] || '').trim(); });
    return obj;
  });
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result.map(s => s.replace(/^"|"$/g, '').replace(/""/g, '"'));
}

// ... (이후 렌더링 관련 함수 renderHome, renderSales 등 기존 코드 복사) ...
// (사용자님이 주신 하단 스크립트 부분을 그대로 뒤에 붙이시면 됩니다.)
</script>
</body>
</html>
